<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html" charset="utf-8"/>
    <title> Compare Period Report </title>
    <script type="text/javascript">
  
          function toggle_visibility(id) {
            var e      = document.getElementById(id);
            var e_show = document.getElementById(id + '_show');
            var e_hide = document.getElementById(id + '_hide');
            var e_sum  = document.getElementById(id + '_summary');
            if(e.style.display == 'none') {
              e.style.display      = '';
              if(e_show)
              {
                e_show.style.display = 'none';
              }
              if(e_hide)
              {
                e_hide.style.display = '';
              }
              if(e_sum)
              {
                e_sum.style.display = 'none';
              }
            }
            else {
              e.style.display      = 'none';
              if(e_show)
              {
                e_show.style.display = '';
              }
              if(e_hide)
              {
                e_hide.style.display = 'none';
              }
              if(e_sum)
              {
                e_sum.style.display = '';
              }
            }
          }
  
          function hide_element(id) {
            var e      = document.getElementById(id);
            var e_show = document.getElementById(id + '_show');
            var e_hide = document.getElementById(id + '_hide');
            var e_sum  = document.getElementById(id + '_summary');
            e.style.display      = 'none';
            if(e_show)
            {
              e_show.style.display = '';
            }
            if(e_hide)
            {
              e_hide.style.display = 'none';
            }
            if(e_sum)
            {
              e_sum.style.display = '';
            }
          }
  
          function show_element(id) {
            var e      = document.getElementById(id);
            var e_show = document.getElementById(id + '_show');
            var e_hide = document.getElementById(id + '_hide');
            var e_sum  = document.getElementById(id + '_summary');
            e.style.display      = '';
            if(e_show)
            {
              e_show.style.display = 'none';
            }
            if(e_hide)
            {
              e_hide.style.display = '';
            }
            if(e_sum)
            {
              e_sum.style.display = 'none';
            }
          }
  
        </script>
    <style type="text/css">

    <p/>
